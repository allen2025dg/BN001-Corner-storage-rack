<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>榫卯思维 · 产品系列</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: #000;
            color: #fff;
        }
        .container {
            min-height: 100vh;
            display: flex;
            flex-wrap: wrap;
        }
        .card {
            flex: 1 1 20%;
            min-width: 280px;
            height: 100vh;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
        }
        /* 背景图 + 暗色渐变 */
        .card:nth-child(1) { background-image: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.2)), url('assets/images/product1.jpg'); }
        .card:nth-child(2) { background-image: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.2)), url('assets/images/product2.jpg'); }
        .card:nth-child(3) { background-image: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.2)), url('assets/images/product3.jpg'); }
        .card:nth-child(4) { background-image: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.2)), url('assets/images/product4.jpg'); }
        .card:nth-child(5) { background-image: linear-gradient(0deg, rgba(0,0,0,0.5), rgba(0,0,0,0.2)), url('assets/images/product5.jpg'); }

        .card-content {
            padding: 2rem;
            width: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            transform: translateY(20%);
            transition: transform 0.4s;
        }
        .card:hover .card-content {
            transform: translateY(0);
        }
        .card h2 {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            letter-spacing: 1px;
        }
        .card p {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 1rem;
        }
        .btn {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 30px;
            background: transparent;
            transition: 0.2s;
        }
        .btn:hover {
            background: #fff;
            color: #000;
        }
        @media (max-width: 1400px) {
            .container { flex-direction: column; }
            .card { width: 100%; height: 100vh; flex: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="product1.html" class="card">
            <div class="card-content">
                <h2>转角收纳架</h2>
                <p>充分利用角落空间</p>
                <span class="btn">了解详情 →</span>
            </div>
        </a>
        <a href="product2.html" class="card">
            <div class="card-content">
                <h2>经典酒架</h2>
                <p>低成本高利润</p>
                <span class="btn">了解详情 →</span>
            </div>
        </a>
        <a href="product3.html" class="card">
            <div class="card-content">
                <h2>3D打印机架</h2>
                <p>稳固散热，模块化</p>
                <span class="btn">了解详情 →</span>
            </div>
        </a>
        <a href="product4.html" class="card">
            <div class="card-content">
                <h2>咖啡胶囊架</h2>
                <p>整齐收纳，随手取用</p>
                <span class="btn">了解详情 →</span>
            </div>
        </a>
        <a href="product5.html" class="card">
            <div class="card-content">
                <h2>茶包收纳架</h2>
                <p>小空间 · 大有序</p>
                <span class="btn">了解详情 →</span>
            </div>
        </a>
    </div>
</body>
</html>
