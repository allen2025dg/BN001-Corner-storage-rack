<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转角收纳架 · 3D展示</title>
    <!-- 注意 import map 使用绝对路径，确保能正确加载 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, Helvetica, sans-serif; }
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.2s;
        }
        .back-home:hover {
            background: white;
            color: black;
        }
        #progress-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background: rgba(0,0,0,0.8);
            color: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            z-index: 1000;
            display: none;
        }
        #progress-bar {
            width: 0%;
            height: 20px;
            background-color: #00ff00;
            border-radius: 10px;
            transition: width 0.2s;
        }
        #progress-text {
            margin-top: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <a href="/index.html" class="back-home">← 返回产品列表</a>
    <div id="progress-container">
        <div style="margin-bottom: 10px;">加载模型中...</div>
        <div style="width:100%; height:20px; background:#444; border-radius:10px;">
            <div id="progress-bar"></div>
        </div>
        <div id="progress-text">0%</div>
    </div>

    <!-- 设置当前产品对应的模型文件路径（模型在 assets/models 下，注意相对路径） -->
    <script>
        window.MODEL_URL = 'assets/models/p1.glb';  // 转角收纳架模型
    </script>

    <!-- 引入 main.js，使用绝对路径 /src/main.js（因为 HTML 在 public 内，根路径指向项目根） -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
